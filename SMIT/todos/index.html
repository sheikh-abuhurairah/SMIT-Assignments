<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App • Edit + Dark Mode</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Todo App</h1>
            <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" type="button">
                <span class="theme-icon">🌙 Dark</span>
            </button>
        </div>


        <form class="add input-group mb-4">
            <input type="text" class="form-control" name="add" placeholder="What needs to be done?" autocomplete="off"
                required>
            <button class="btn btn-primary" type="submit">Add</button>
        </form>


        <div class="search mb-4">
            <input type="text" class="form-control" placeholder="Search todos...">
        </div>

        <ul class="todos list-group empty-list"></ul>

        <p class="no-results" style="display:none;">No todos match your search...</p>

        <footer>Double-click to edit • Enter/Esc to save/cancel</footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
