<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM In-Class Exercises</title>
</head>
<body>

    <h2>Exercise 1: Change Heading Text</h2>
    <h2 id="text">Hello</h2>
    <button onclick="changeText()">Change Text</button>
    <hr>

    <h2>Exercise 2: Change Paragraph Text</h2>
    <p id="para">This is old text</p>
    <button onclick="updateText()">Update</button>
    <hr>

    <h2>Exercise 3: Show Input Value</h2>
    <input type="text" id="name">
    <button onclick="showName()">Show</button>
    <p id="result"></p>
    <hr>

    <h2>Exercise 4: Change Text After Delay</h2>
    <p id="msg">Waiting...</p>
    <hr>


    <h2>Exercise 5: Simple Text Change</h2>
    <h3 id="message">Click below</h3>
    <button onclick="changeMessage()">Click</button>

    <script src="app.js"></script>

</body>
</html>
