<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-dark">
    <div class="box">
        <div class="container  d-flex justify-content-center w-50 vh-100 align-items-center">
            <div class="box border border-2 border-light h-75 w-75 bg-light rounded-5">
                <div class="row gap-4 p-5 ">
                    <div class="col-12 form-group">
                        <label class="h5" for="email">Email </label>
                        <input class="form-control" type="email" name="email" id="email" placeholder="Enter you email">
                    </div>
                    <div class="col-12 form-group">
                        <label class="h5" for="password">Password </label>
                        <input class="form-control" type="password" name="password" id="password"
                            placeholder="Enter you password">
                    </div>
                    <div class="col-12 form-group">
                        <label class="h5" for="re-password">Re enter Password </label>
                        <input class="form-control" type="password" name="re-password" id="re-password"
                            placeholder="Enter password again">
                    </div>
                    <div class="col-12 form-group py-2">
                        <button class="btn btn-dark w-100 fs-5">Sign-up</button>
                    </div>
                    <div class="col-12 form-group ">
                        <p>Already have an account</p>
                        <a class="text-decoration-none text-white btn btn-dark w-100 fs-5  " href="login.html">Login</a>
                    </div>

                </div>
            </div>


        </div>
    </div>






    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
