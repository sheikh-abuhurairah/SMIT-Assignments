<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, sans-serif;
            background: radial-gradient(circle at top, #e2e8f0, #f8fafc);
            display: flex;
            justify-content: center;
            padding: 60px 15px;
        }

        /* container */
        ul {
            list-style: none;
            padding: 0;
            width: 460px;
        }

        /* CARD */
        ul li {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 16px;
            margin-bottom: 14px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all .25s ease;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        /* top accent glow line */
        ul li::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa, #a78bfa);
            transform: scaleX(0);
            transform-origin: left;
            transition: .3s;
        }

        ul li:hover::before {
            transform: scaleX(1);
        }

        /* hover effect */
        ul li:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
        }

        /* NAME */
        ul li strong {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #0f172a;
        }

        /* avatar */
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.3);
        }

        /* details (YOUR JS ALREADY HANDLES SHOW/HIDE) */
        .details {
            margin-top: 10px;
            color: #475569;
            font-size: 14px;
            line-height: 1.7;
        }

        /* active state (ONLY visual upgrade) */
        ul li.active {
            border-color: #3b82f6;
            box-shadow: 0 18px 40px rgba(59, 130, 246, 0.12);
            background: #f8fbff;
        }
    </style>
</head>

<body>
    <ul></ul>
</body>
<script src="async-javascript.js"></script>
<!-- <script src="set-and-map.js.js"></script> -->

</html>
