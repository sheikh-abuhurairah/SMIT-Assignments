<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpHub AI | Request Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="app.js"></script>
  </head>
  <body data-page="detail">
    <header class="topbar">
      <div class="container nav">
        <a class='brand' href='index.html'><span class="brand-badge">H</span><span>HelpHub AI</span></a>
        <nav class="nav-links"><a href='dashboard.html'>Dashboard</a><a href='explore.html'>Explore</a><a href='messages.html'>Messages</a></nav>
      </div>
    </header>
    <main class="container">
      <section class="page-hero"><div class="panel"><p class="eyebrow">Request detail</p><div data-request-meta class="tag-row"></div><h1 data-request-title style="font-size: clamp(2.1rem, 4vw, 3.8rem);"></h1><p data-request-description></p></div></section>
      <section class="detail-grid section">
        <div class="stack">
          <div class="panel"><p class="section-kicker">AI summary</p><h3>What this request needs</h3><p data-request-summary></p><div class="tag-row" data-request-tags></div></div>
          <div class="panel"><p class="section-kicker">Actions</p><div class="row"><button class="btn btn-primary" data-cta-help>I can help</button><button class="btn btn-secondary" data-cta-solved>Mark as solved</button></div></div>
        </div>
        <aside class="stack">
          <div class="panel"><p class="section-kicker">Requester</p><div data-request-requester></div></div>
          <div class="panel"><p class="section-kicker">Helpers</p><h3>People ready to support</h3><div class="helper-list" data-helper-list></div></div>
        </aside>
      </section>
    </main>
  </body>
</html>
