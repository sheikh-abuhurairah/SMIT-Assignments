<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HelpHub AI | Explore Requests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="app.js"></script>
  </head>
  <body data-page="explore">
    <header class="topbar">
      <div class="container nav">
        <a class='brand' href='index.html'><span class="brand-badge">H</span><span>HelpHub AI</span></a>
        <nav class="nav-links"><a href='dashboard.html'>Dashboard</a><a data-nav='explore' href='explore.html'>Explore</a><a href='leaderboard.html'>Leaderboard</a><a href='notifications.html'>Notifications</a></nav>
      </div>
    </header>
    <main class="container">
      <section class="page-hero"><div class="panel"><p class="eyebrow">Explore / Feed</p><h1 style="font-size: clamp(2.2rem, 4vw, 4rem);">Browse help requests with filterable community context.</h1><p>Filter by category, urgency, skills, and location to surface the best matches.</p></div></section>
      <section class="feed-grid section">
        <form class="panel stack" data-filter-form>
          <div><p class="section-kicker">Filters</p><h2>Refine the feed</h2></div>
          <div class="field"><label>Category</label><select name="category"><option value="">All categories</option><option>Web Development</option><option>Design</option><option>Career</option><option>Academics</option><option>Content</option><option>Community</option></select></div>
          <div class="field"><label>Urgency</label><select name="urgency"><option value="">All urgency levels</option><option>Critical</option><option>High</option><option>Medium</option><option>Low</option></select></div>
          <div class="field"><label>Skills</label><input name="skill" type="text" placeholder="React, Figma, Git/GitHub" /></div>
          <div class="field"><label>Location</label><input name="location" type="text" placeholder="Karachi, Lahore, Remote" /></div>
        </form>
        <div class="stack" data-feed-results></div>
      </section>
    </main>
  </body>
</html>
