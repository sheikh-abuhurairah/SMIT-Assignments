<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>HelpHub AI | Create Request</title>
        <link rel="preconnect" href="https://fonts.googleapis.com"/>
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
        <link rel="stylesheet" href="style.css"/>
        <script defer src="app.js"></script>
    </head>
    <body data-page="create">
        <header class="topbar">
            <div class="container nav">
                <a class='brand' href='index.html'>
                    <span class="brand-badge">H</span>
                    <span>HelpHub AI</span>
                </a>
                <nav class="nav-links">
                    <a href='dashboard.html'>Dashboard</a>
                    <a href='explore.html'>Explore</a>
                    <a data-nav='create' href='create-request.html'>Create Request</a>
                </nav>
            </div>
        </header>
        <main class="container">
            <section class="page-hero">
                <div class="panel">
                    <p class="eyebrow">Create request</p>
                    <h1 style="font-size: clamp(2.2rem, 4vw, 4rem);">Turn a rough problem into a clear help request.</h1>
                    <p>Use built-in AI suggestions for category, urgency, tags, and a stronger description rewrite.</p>
                </div>
            </section>
            <section class="detail-grid section">
                <form class="form-card stack" data-create-form>
                    <div class="field">
                        <label for="request-title">Title</label>
                        <input id="request-title" type="text" placeholder="Need review on my JavaScript quiz app before submission" required/>
                    </div>
                    <div class="field">
                        <label for="request-description">Description</label>
                        <textarea id="request-description" placeholder="Explain the challenge, your current progress, deadline, and what kind of help would be useful." required></textarea>
                    </div>
                    <div class="form-grid">
                        <div class="field">
                            <label for="request-tags">Tags</label>
                            <input id="request-tags" type="text" placeholder="JavaScript, Debugging, Review"/>
                        </div>
                        <div class="field">
                            <label for="request-category">Category</label>
                            <select id="request-category" required>
                                <option>Web Development</option>
                                <option>Design</option>
                                <option>Career</option>
                                <option>Academics</option>
                                <option>Content</option>
                                <option>Community</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="request-urgency">Urgency</label>
                            <select id="request-urgency" required>
                                <option>Critical</option>
                                <option selected>High</option>
                                <option>Medium</option>
                                <option>Low</option>
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <button class="btn btn-secondary" type="button" data-fill-ai>Apply AI suggestions</button>
                        <button class="btn btn-primary" type="submit">Publish request</button>
                    </div>
                </form>
                <aside class="panel">
                    <p class="section-kicker">AI assistant</p>
                    <h2>Smart request guidance</h2>
                    <div data-ai-request-insights></div>
                </aside>
            </section>
        </main>
    </body>
</html>
