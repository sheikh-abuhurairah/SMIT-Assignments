<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Profile Finder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>GitHub Profile Finder</h1>

<div class="search-box">
    <input type="text" id="usernameInput" placeholder="Enter GitHub username">
    <button id="searchBtn">Search</button>
</div>

<p id="statusText"></p>

<div id="profileCard" class="card">

<img id="userImg">

<h2 id="userName"></h2>
<p id="userBio"></p>

<div class="stats">
    <div>
        <span id="followers">0</span>
        <p>Followers</p>
    </div>

    <div>
        <span id="following">0</span>
        <p>Following</p>
    </div>

    <div>
        <span id="repos">0</span>
        <p>Repos</p>
    </div>
</div>

<a id="profileLink" target="_blank">View Profile</a>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
