<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Quiz App</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- RESULT -->
    <div class="result d-none">
        <p>Your Score</p>
        <h1><span>0%</span></h1>
    </div>

    <form class="quiz-form">

        <div class="header">
            <h2>JavaScript Quiz</h2>
            <p>Test your fundamentals</p>
        </div>

        <!-- Question -->
        <div class="question">
            <h4>1. Which keyword declares variable?</h4>

            <label><input type="radio" name="q1" value="a"> function</label>
            <label><input type="radio" name="q1" value="b"> class</label>
            <label><input type="radio" name="q1" value="c"> let</label>
            <label><input type="radio" name="q1" value="d"> switch</label>
        </div>

        <div class="question">
            <h4>2. Convert JSON to Object?</h4>

            <label><input type="radio" name="q2" value="a"> JSON.parse()</label>
            <label><input type="radio" name="q2" value="b"> JSON.stringify()</label>
            <label><input type="radio" name="q2" value="c"> parseInt()</label>
            <label><input type="radio" name="q2" value="d"> Object()</label>
        </div>

        <div class="question">
            <h4>3. JavaScript is?</h4>

            <label><input type="radio" name="q3" value="a"> Programming Language</label>
            <label><input type="radio" name="q3" value="b"> Database</label>
            <label><input type="radio" name="q3" value="c"> Browser</label>
            <label><input type="radio" name="q3" value="d"> Server</label>
        </div>

        <div class="question">
            <h4>4. DOM stands for?</h4>

            <label><input type="radio" name="q4" value="a"> Document Object Model</label>
            <label><input type="radio" name="q4" value="b"> Data Model</label>
            <label><input type="radio" name="q4" value="c"> Design Model</label>
            <label><input type="radio" name="q4" value="d"> None</label>
        </div>

        <button class="submit-btn">Submit Quiz</button>

    </form>

</div>

<script src="app.js"></script>

</body>
</html>
