<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random User App</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="bg-animation"></div>

<div class="app">

    <h1>✨ Random User Explorer</h1>

    <div class="card" id="card">

        <div class="img-wrapper">
            <img id="userImg">
        </div>

        <h2 id="userName">Loading...</h2>

        <div class="details">
            <p>📧 <span id="userEmail"></span></p>
            <p>🌍 <span id="userCountry"></span></p>
        </div>

        <p id="statusText" class="status">Ready</p>

        <button id="btn">Generate User</button>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
